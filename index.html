<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portals Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f1014; color: white; text-align: center; padding: 20px; padding-bottom: 50px; }
        .header { margin-bottom: 30px; }
        .section-title { font-size: 18px; color: #aaa; margin: 20px 0 10px; text-align: right; }
        .card { background: #1c1f26; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #2d323e; }
        .card:active { background: #2d323e; border-color: #00d2ff;}
        .info { text-align: right; }
        .price { color: #00d2ff; font-weight: bold; }
        .wallet-box { background: #1c1f26; border-radius: 12px; padding: 15px; margin-top: 30px; border: 1px solid #ffcc00; text-align: center; }
        .wallet-title { color: #ffcc00; font-weight: bold; margin-bottom: 10px; font-size: 14px;}
        .wallet-address { font-size: 11px; color: #aaa; word-break: break-all; background: #0f1014; padding: 10px; border-radius: 8px;}
    </style>
</head>
<body>
    <div class="header">
        <h2>Portals Market</h2>
        <p style="color: #888;">اختر البطاقة التي تريد شراءها</p>
    </div>

    <div class="section-title">RAZER GOLD (Rate: 81$)</div>
    <div class="card" onclick="selectItem('RAZER GOLD', 25, 20.25)">
        <div class="info"><div>25$ Razer Gold</div></div>
        <div class="price">20.25 USDT</div>
    </div>
    <div class="card" onclick="selectItem('RAZER GOLD', 50, 40.50)">
        <div class="info"><div>50$ Razer Gold</div></div>
        <div class="price">40.50 USDT</div>
    </div>
    <div class="card" onclick="selectItem('RAZER GOLD', 100, 81.00)">
        <div class="info"><div>100$ Razer Gold</div></div>
        <div class="price">81.00 USDT</div>
    </div>

    <div class="section-title">ITUNES USA (Rate: 73$)</div>
    <div class="card" onclick="selectItem('ITUNES USA', 25, 18.25)">
        <div class="info"><div>25$ iTunes USA</div></div>
        <div class="price">18.25 USDT</div>
    </div>
    <div class="card" onclick="selectItem('ITUNES USA', 100, 73.00)">
        <div class="info"><div>100$ iTunes USA</div></div>
        <div class="price">73.00 USDT</div>
    </div>

    <div class="wallet-box">
        <div class="wallet-title">CRYPTO PAYMENT (BEP20)</div>
        <div class="wallet-address">0x310715c0F17a38B529db662E733633a5446a9431</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function selectItem(name, value, price) {
            let data = { item: name, value: value, price: price };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
